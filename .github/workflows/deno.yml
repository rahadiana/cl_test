name: Public Tunnel Testing

on: [push]

jobs:
  test-with-tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 30     # Batas waktu agar tidak makan kuota

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Install app dependencies (sesuaikan) ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install express

      # --- Jalankan app di background ---
      - name: Start app
        run: node index.js &        # Ganti sesuai cara start app kamu

      - name: Wait for app ready
        run: |
          for i in {1..15}; do
            curl -s http://localhost:3000 && break
            echo "Waiting... ($i)"
            sleep 2
          done

      # --- Install & jalankan cloudflared ---
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Start Cloudflare Tunnel
        run: |
          cloudflared tunnel --url http://localhost:3000 \
            --no-autoupdate \
            --logfile /tmp/cloudflared.log &
          
          # Tunggu URL muncul di log
          sleep 5
          TUNNEL_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/cloudflared.log | head -1)
          
          echo "========================================"
          echo "🌐 PUBLIC URL: $TUNNEL_URL"
          echo "========================================"
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV


      - name: Keep tunnel alive (15 menit)
        run: |
          echo "Tunnel aktif di: $TUNNEL_URL"
          echo "Tekan Cancel job di GitHub untuk menghentikan"
          sleep 900  # 15 menit

